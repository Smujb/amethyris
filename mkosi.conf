[Config]
MinimumVersion=27~devel
Profiles=
		bootc

[Build]
ToolsTree=default
History=yes
CacheDirectory=mkosi.cache
Incremental=yes

[Distribution]
Distribution=arch
Release=rolling

[Output]
ImageId=amethyris
OutputDirectory=mkosi.output
Output=%i_%v_%a


[Build]
SandboxTrees=
        repos/multilib.conf:/etc/pacman.d/multilib.conf
